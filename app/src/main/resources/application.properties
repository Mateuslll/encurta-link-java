# Reduce logging level to make sure the application works with SAM local
# https://github.com/aws/serverless-java-container/issues/134
logging.level.root=INFO

# JWT Configuration
jwt.public.key=classpath:app.pub
jwt.private.key=classpath:app.key

# AWS Configuration
spring.cloud.aws.region.static=sa-east-1
spring.cloud.aws.dynamodb.endpoint=http://localstack-main:4566
